<!DOCTYPE html>
<html lang="zh-CN">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

            height: 100%;
            overflow: hidden;
        }

        }

            display: flex;
            width: 100%;
            height: 100%;
            gap: 0;
            flex-direction: row;
        }
        
        @media (min-width: 1024px) {
            .container {
                gap: 20px;
                padding: 20px;
            }
            
            .chart-container {
                flex: 2;
                border-radius: 12px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            }
            
            .sidebar {
                flex: 1;
                border-radius: 12px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            }
        }
        
        @media (min-width: 768px) and (max-width: 1023px) {
            .container {
                gap: 10px;
                padding: 10px;
            }
            
            .chart-container {
                flex: 1.5;
                border-radius: 8px;
                box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            }
            
            .sidebar {
                flex: 1;
                border-radius: 8px;
                box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            }
        }
        
        @media (max-width: 767px) {
            .container {
                flex-direction: column;
                padding: 0;
                gap: 0;
            }
            
            .chart-container {
                flex: 1;
                min-height: 45%;
                border-radius: 0;
            }
            
            .sidebar {
                flex: 1;
                min-height: 55%;
                border-radius: 0;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }
        }
        
        .chart-container {
            background: white;
            overflow: hidden;
            position: relative;
        }
        
        #chart {
            width: 100%;
            height: 100%;
        }
        
        .sidebar {
            background: white;
            padding: 15px;
            overflow-y: auto;

        }

            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card-title {
            font-size: 14px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        @media (max-width: 767px) {

                font-size: 13px;
            }
        }
        
        .card-content {
            font-size: 12px;
            color: #555;
            line-height: 1.5;
        }
        
        .sub-nodes {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e0e0e0;
        }
        
        .sub-nodes strong {
            font-size: 12px;
            display: block;
            margin-bottom: 8px;
            color: #333;
        }
        
        .sub-node-item {
            background: white;
            padding: 8px;
            margin-bottom: 6px;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 12px;
            word-break: break-word;
        }

            background: #667eea;
            color: white;
            transform: scale(0.98);
        }
        
        .sub-node-item:hover {
            background: #667eea;
            color: white;
            transform: translateX(3px);
        }
        
        .empty-state {
            text-align: center;
            padding: 30px 15px;
            color: #999;
        }
        
        .empty-state div {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        @media (max-width: 767px) {
            .empty-state {
                padding: 20px 10px;
            }
            
            .empty-state div {
                font-size: 28px;
            }
        }

            font-size: 11px;
            color: #666;
            padding: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        
        .legend-item {
            display: inline-block;
            margin-right: 15px;
            margin-bottom: 4px;
        }
        
        .legend-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }

            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
        }

            color: #555;
            line-height: 1.6;

            background: #f1f1f1;
            border-radius: 10px;

            background: #667eea;
            border-radius: 10px;
        }

            background: #764ba2;
        }

            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

            background: #764ba2;
            transform: translateX(-3px);
        }

        .back-btn:active {
            transform: scale(0.98);
        }

        .back-btn.hidden {
            display: none;
        }
    </style>
</head>

                        description: "在传统造纸工艺基础上进行创新，拓展传统技艺应用场景。",
                        details: "基础纸制作是在传统造纸工艺基础上制作满足现代需求的古法纸张。花草纸制作是将花草元素融入纸张制作，使传统纸张具有更多艺术表现形式。文创产品开发是将古法纸应用于现代文化创意产品，拓展传统技艺应用场景。",
                        children: {
                            "基础纸制作": "在传统造纸工艺基础上制作满足现代需求的古法纸张",
                            "花草纸制作": "将花草元素融入纸张制作，使传统纸张具有更多艺术表现形式",
                            "文创产品开发": "将古法纸应用于现代文化创意产品，拓展传统技艺应用场景"
                        }
                    },
                    "传承现状与发展困境": {
                        description: "掌握完整古法造纸技艺的匠人数量有限，面临生产成本较高、市场需求变化等问题。",
                        details: "掌握完整古法造纸技艺的匠人数量有限，仅1名市级传承人、1名县级申报人。古法造纸制作周期较长，人工成本较高。现代工业纸品普及，对传统纸张市场造成影响。需要通过创新方式吸引年轻人参与非遗传承。无法大规模工厂化量产，仅小型手工作坊运营。",
                        children: {
                            "传承人员不足": "掌握完整古法造纸技艺的匠人数量有限，仅1名市级传承人、1名县级申报人",
                            "生产成本较高": "古法造纸制作周期较长，人工成本较高",
                            "市场需求变化": "现代工业纸品普及，对传统纸张市场造成影响",
                            "年轻群体参与不足": "需要通过创新方式吸引年轻人参与非遗传承",
                            "行业规模限制": "无法大规模工厂化量产，仅小型手工作坊运营"
                        }
                    },
                    "产业经营模式": {
                        description: "通过产品销售、研学体验、文创开发和文旅融合四种方式实现产业经营。",
                        details: "产品销售是通过销售古法纸张获得经济收益。研学体验是开展造纸体验课程，将技艺展示转化为文化体验项目。文创开发是开发具有古法造纸特色的文化产品。文旅融合是结合乡村旅游，提高古法造纸文化传播范围。",
                        children: {
                            "产品销售": "通过销售古法纸张获得经济收益",
                            "研学体验": "开展造纸体验课程，将技艺展示转化为文化体验项目",
                            "文创开发": "开发具有古法造纸特色的文化产品",
                            "文旅融合": "结合乡村旅游，提高古法造纸文化传播范围"
                        }
                    },
                    "活态传承发展": {
                        description: "通过非遗研学、展览展示和跨界融合实现古法造纸文化创新发展。",
                        details: "非遗研学通过研学课程让更多人了解和体验古法造纸技艺。展览展示通过展览、文化活动展示传统造纸文化。跨界融合与文创、旅游、教育等领域结合，实现古法造纸文化创新发展。",
                        children: {
                            "非遗研学": "通过研学课程让更多人了解和体验古法造纸技艺",
                            "展览展示": "通过展览、文化活动展示传统造纸文化",
                            "跨界融合": "与文创、旅游、教育等领域结合，实现古法造纸文化创新发展"
                        }
                    }
                }
            }
        };

        const nodesData = [];
        const linksData = [];
        const idToNodeMap = {};
        let nextNodeId = 0;

        const levelConfigs = [
            { level: 1, symbolSize: 50, color: '#667eea' },
            { level: 2, symbolSize: 35, color: '#764ba2' },
            { level: 3, symbolSize: 25, color: '#f97316' },
            { level: 4, symbolSize: 20, color: '#10b981' }
        ];

        function createNode(name, level, parentId, description, details, children) {
            const nodeId = nextNodeId++;
            const config = levelConfigs[level - 1] || levelConfigs[levelConfigs.length - 1];
            
            const node = {
                nodeId: nodeId,
                id: nodeId,
                name: name,
                level: level,
                parentId: parentId,
                childrenIds: [],
                symbolSize: config.symbolSize,
                itemStyle: { color: config.color },
                data: {
                    description: description || '',
                    details: details || '',
                    children: children || {}
                }
            };
            
            nodesData.push(node);
            idToNodeMap[nodeId] = node;
            
            return nodeId;
        }

        function parseChildren(parentNodeId, parentLevel, childrenData) {
            if (!childrenData || typeof childrenData !== 'object') {
                return [];
            }
            
            const childrenIds = [];
            const childNames = Object.keys(childrenData);
            
            childNames.forEach(childName => {
                const childData = childrenData[childName];
                const childLevel = parentLevel + 1;
                
                let description = '';
                let details = '';
                let grandchildren = {};
                
                if (typeof childData === 'string') {
                    description = childData;
                } else if (typeof childData === 'object') {
                    description = childData.description || '';
                    details = childData.details || '';
                    grandchildren = childData.children || {};
                }
                
                const childId = createNode(childName, childLevel, parentNodeId, description, details, grandchildren);
                childrenIds.push(childId);
                linksData.push({ source: parentNodeId, target: childId });
                
                if (grandchildren && Object.keys(grandchildren).length > 0) {
                    const grandchildIds = parseChildren(childId, childLevel, grandchildren);
                    const childNode = idToNodeMap[childId];
                    if (childNode) {
                        childNode.childrenIds = grandchildIds;
                    }
                }
            });
            
            return childrenIds;
        }

        const rootId = createNode("松阳非遗文化", 1, null, "松阳县非物质文化遗产涵盖茶叶、太平体系、竹编、古法造纸等多个领域，承载着丰富的地域文化记忆和传统技艺传承。", "", knowledgeData);
        
        if (knowledgeData) {
            const childrenIds = parseChildren(rootId, 1, knowledgeData);
            const rootNode = idToNodeMap[rootId];
            if (rootNode) {
                rootNode.childrenIds = childrenIds;
            }
        }

        const chart = echarts.init(document.getElementById('chart'));
        const option = {
            title: {
                text: '松阳非遗文化知识图谱',
                left: 'center',
                top: 10,
                textStyle: { color: '#333', fontSize: window.innerWidth < 768 ? 14 : 18, fontWeight: 'bold' }
            },
            tooltip: {
                trigger: 'item',
                formatter: function(params) {
                    if (params.data) {
                        return params.data.name;
                    }
                    return params.name;
                }
            },
            series: [{
                type: 'graph',
                layout: 'force',
                force: {
                    repulsion: 80,
                    gravity: 0.03,
                    edgeLength: 120,
                    layoutAnimation: true
                },
                data: nodesData,
                links: linksData,
                roam: true,
                label: {
                    show: true,
                    formatter: function(params) {
                        return params.data.name;
                    },
                    fontSize: window.innerWidth < 768 ? 9 : 11,
                    fontWeight: 'bold'
                },
                lineStyle: {
                    color: '#ccc',
                    width: 1,
                    opacity: 0.6
                },
                itemStyle: {
                    borderColor: '#fff',
                    borderWidth: 2,
                    shadowBlur: 8,
                    shadowColor: 'rgba(0,0,0,0.15)'
                },
                emphasis: {
                    label: { show: true },
                    itemStyle: {
                        borderWidth: 3,
                        shadowBlur: 12
                    }
                }
            }]
        };

        chart.setOption(option);

        let currentNodeId = null;

        chart.on('click', function(params) {
            if (params.data) {
                const node = params.data;
                currentNodeId = node.nodeId;
                displayInfo(node);
            }
        });

        function generateChildrenButtons(node) {
            const childrenIds = node.childrenIds || [];
            if (childrenIds.length === 0) {
                return '<div style="color: #999; font-size: 12px;">暂无子节点</div>';
            }
            return childrenIds.map((childId, idx) => {
                const childNode = idToNodeMap[childId];
                if (!childNode) {
                    return '';
                }
                return `<div class="sub-node-item" onclick="jumpToNode(${childNode.nodeId}, event)">${idx + 1}. ${childNode.name} →</div>`;
            }).join('');
        }

        function displayInfo(node) {
            const infoPanel = document.getElementById('info-panel');
            const backBtn = document.getElementById('back-btn');
            
            currentNodeId = node.nodeId;
            
            if (node.parentId === null) {
                backBtn.classList.add('hidden');
            } else {
                backBtn.classList.remove('hidden');
            }

            let html = '';

            if (node.level === 1) {
                html = `
                    <div class="card">
                        <div class="card-title">📍 ${node.name}</div>
                        <div class="card-content">${node.data.description}</div>
                        <div class="sub-nodes">
                            <strong>📚 下属部分：</strong>
                            ${generateChildrenButtons(node)}
                        </div>
                    </div>
                `;
            } else if (node.level === 2) {
                html = `
                    <div class="card">
                        <div class="card-title">📘 ${node.name}</div>
                        <div class="card-content">${node.data.description}</div>
                        <div class="details">
                            <strong style="color: #667eea; font-size: 12px;">📄 详细信息：</strong>
                            <div class="detail-text">${node.data.details || ''}</div>
                        </div>
                        <div class="sub-nodes">
                            <strong>🔍 子项目：</strong>
                            ${generateChildrenButtons(node)}
                        </div>
                    </div>
                `;
            } else if (node.level === 3) {
                html = `
                    <div class="card">
                        <div class="card-title">📄 ${node.name}</div>
                        <div class="details">
                            <div class="detail-text">${node.data.description}</div>
                            ${node.data.details ? `<div style="margin-top: 8px; padding-top: 8px; border-top: 1px dashed #e0e0e0;"><strong style="color: #667eea; font-size: 12px;">📝 详细信息：</strong><div class="detail-text">${node.data.details}</div></div>` : ''}
                        </div>
                        <div class="sub-nodes">
                            <strong>🔍 子项目：</strong>
                            ${generateChildrenButtons(node)}
                        </div>
                    </div>
                `;
            } else if (node.level === 4) {
                html = `
                    <div class="card">
                        <div class="card-title">📝 ${node.name}</div>
                        <div class="details">
                            <div class="detail-text">${node.data.description}</div>
                            ${node.data.details ? `<div style="margin-top: 8px; padding-top: 8px; border-top: 1px dashed #e0e0e0;"><strong style="color: #667eea; font-size: 12px;">📝 详细信息：</strong><div class="detail-text">${node.data.details}</div></div>` : ''}
                        </div>
                        <div class="sub-nodes">
                            <strong>🔍 子项目：</strong>
                            ${generateChildrenButtons(node)}
                        </div>
                    </div>
                `;
            }

            infoPanel.innerHTML = html;
        }

        window.jumpToNode = function(nodeId, event) {
            event.stopPropagation();
            const node = idToNodeMap[nodeId];
            if (node) {
                currentNodeId = nodeId;
                displayInfo(node);
            }
        };

        window.goBack = function() {
            if (currentNodeId !== null) {
                const currentNode = idToNodeMap[currentNodeId];
                if (currentNode && currentNode.parentId !== null) {
                    const parentNode = idToNodeMap[currentNode.parentId];
                    if (parentNode) {
                        displayInfo(parentNode);
                    }
                }
            }
        };

        window.addEventListener('resize', () => {
            chart.resize();
        });
    </script>
</body>
</html>
